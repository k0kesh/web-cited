name: Terms of Service drift check

# Monthly check for drift between the shipped product and the live
# Terms of Service. Fires on the 15th of every month and on manual
# dispatch. Half-month offset from the privacy-audit workflow (which
# fires on the 1st) so the two reviews land in different weeks and
# the operator does not get two assignment-emails on the same morning.
#
# When drift is detected, files a GitHub Issue and emails NOTIFY_EMAIL.
# When no drift is detected, exits clean: no issue, no email.
#
# Required secrets (shared with privacy-audit.yml; set at the repo
# level):
#   DEPLOY_KEY_API       Private half of a read-only ed25519 deploy key
#                        registered on k0kesh/web-cited-api. Used only
#                        to clone that repo.
#   DEPLOY_KEY_PIPELINE  Same, for k0kesh/web-cited-pipeline.
#
# GITHUB_TOKEN is auto-provided by Actions and scoped below to
# issues:write. Deploy keys are per-repo and read-only: narrowest
# possible blast radius.
#
# Notification: when drift is detected, the notify step opens a GitHub
# Issue assigned to k0kesh. GitHub's built-in assignment email delivers
# the alert; there is no separate transactional email.
#
# Host-migration note: this workflow runs in GitHub Actions and depends
# on the source repos staying on GitHub. If the source moves off GitHub
# (Railway, Vercel, GitLab, anywhere else), this workflow stops firing
# and an equivalent monthly cron must be set up on the new platform.
# The audit logic itself (in tos-audit.sh) is portable: it shells out
# to git and curl only.

on:
  schedule:
    # 15th of every month at 13:17 UTC (~9:17 AM ET). Same minute as
    # the privacy audit, fourteen days offset.
    - cron: '17 13 15 * *'
  workflow_dispatch:
    inputs:
      since:
        description: 'Optional cutoff override (ISO date, e.g. 2026-01-01). Defaults to last terms.html commit.'
        required: false
        default: ''

permissions:
  issues: write
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout web-cited (full history, need terms.html log)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure SSH deploy keys
        env:
          DEPLOY_KEY_API: ${{ secrets.DEPLOY_KEY_API }}
          DEPLOY_KEY_PIPELINE: ${{ secrets.DEPLOY_KEY_PIPELINE }}
        run: |
          if [ -z "$DEPLOY_KEY_API" ] || [ -z "$DEPLOY_KEY_PIPELINE" ]; then
            echo "::error::DEPLOY_KEY_API or DEPLOY_KEY_PIPELINE secret is missing. Re-generate keypairs and register read-only deploy keys on the two private repos, then store the private halves as repo secrets here."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY_API"      > ~/.ssh/deploy-api
          printf '%s\n' "$DEPLOY_KEY_PIPELINE" > ~/.ssh/deploy-pipeline
          chmod 600 ~/.ssh/deploy-api ~/.ssh/deploy-pipeline
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

      - name: Clone sibling private repos via deploy keys
        run: |
          # IdentitiesOnly=yes forces each clone to use only its matched
          # key. Otherwise SSH might present the wrong key first and
          # waste a rate-limited attempt.
          GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy-api -o IdentitiesOnly=yes" \
            git clone --depth 100 --quiet git@github.com:k0kesh/web-cited-api.git /tmp/web-cited-api
          GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy-pipeline -o IdentitiesOnly=yes" \
            git clone --depth 100 --quiet git@github.com:k0kesh/web-cited-pipeline.git /tmp/web-cited-pipeline

      - name: Run drift audit
        id: audit
        env:
          FORCE_CUTOFF_ISO: ${{ inputs.since }}
        run: bash .github/scripts/tos-audit.sh

      - name: Notify on drift (open Issue)
        if: steps.audit.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CUTOFF: ${{ steps.audit.outputs.cutoff }}
        run: bash .github/scripts/tos-notify.sh
